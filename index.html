<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>점심부</title>

  <!-- Pretendard 폰트 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- ────────── 헤더 ────────── -->
  <header class="app-header">
    <h1>🍱 점심부</h1>
    <label class="header-date-wrap">
      <span class="header-date" id="header-date-label"></span>
      <input type="date" id="lunch-date-input"
             onchange="Actions.onDateChange(this.value)"
             style="position:absolute;opacity:0;width:100%;height:100%;top:0;left:0;cursor:pointer"/>
    </label>
  </header>

  <!-- ────────── 탭 콘텐츠 ────────── -->
  <div class="tab-content">

    <!-- ══════════ 홈 탭 ══════════ -->
    <div class="tab-pane" data-tab="home">

      <!-- 오늘의 담당자 카드 -->
      <div class="payer-card" id="payer-card">
        <div class="payer-label">오늘의 결제 담당자</div>
        <div class="payer-name">불러오는 중...</div>
      </div>

      <!-- Step 2: 식당 선택 -->
      <div class="card" id="restaurant-step">
        <div class="step-header">
          <div class="step-num">2</div>
          <div class="step-title">식당 선택</div>
        </div>
        <div class="chip-group">
          <div class="chip chip-add" onclick="Sheet.open('sheet-restaurant-input')">+ 직접 입력</div>
        </div>
      </div>

      <!-- Step 3: 메뉴 선택 -->
      <div class="card" id="menu-step">
        <div class="step-header">
          <div class="step-num">3</div>
          <div class="step-title" style="color:var(--gray-300)">메뉴 선택</div>
        </div>
        <div style="color:var(--gray-400);font-size:var(--font-sm)">식당을 먼저 선택해 주세요</div>
      </div>

      <!-- Step 4: 결제 완료 -->
      <div class="card" id="payment-step">
        <div class="step-header">
          <div class="step-num">4</div>
          <div class="step-title">결제 완료</div>
        </div>
        <div class="amount-input-wrap" style="margin-bottom:12px">
          <input class="input-field" type="text" placeholder="0"
                 style="padding:14px 48px 14px 16px;font-size:var(--font-xl);font-weight:700" disabled/>
          <span class="amount-unit">원</span>
        </div>
        <button class="btn btn-primary" disabled>등록 완료</button>
      </div>

    </div><!-- /홈 탭 -->


    <!-- ══════════ 기록 탭 ══════════ -->
    <div class="tab-pane" data-tab="records">

      <!-- 이번 주 순번 -->
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <div class="card-title" style="margin:0">결제 순번</div>
          <span style="font-size:11px;color:var(--gray-400)">드래그로 순서 변경</span>
        </div>
        <div class="order-list" id="weekly-order-list">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- 금액 통계 -->
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
          <div class="card-title" style="margin:0">금액 통계</div>
          <div class="filter-tabs" style="width:auto">
            <button class="filter-tab active" data-filter="year"
                    onclick="Actions.setAmountFilter('year')">올해</button>
            <button class="filter-tab" data-filter="month"
                    onclick="Actions.setAmountFilter('month')">이번달</button>
          </div>
        </div>
        <div id="amount-stats">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- 식사 내역 -->
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
          <div class="card-title" style="margin:0">식사 내역</div>
          <div style="display:flex;align-items:center;gap:6px">
            <button class="btn btn-ghost btn-sm" style="padding:6px 10px"
                    onclick="Actions.prevMonth()">‹</button>
            <span id="record-month-label" style="font-size:var(--font-sm);font-weight:600;color:var(--gray-700);min-width:48px;text-align:center"></span>
            <button class="btn btn-ghost btn-sm" style="padding:6px 10px"
                    onclick="Actions.nextMonth()" id="record-next-btn">›</button>
          </div>
        </div>
        <div id="record-list">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>

    </div><!-- /기록 탭 -->


    <!-- ══════════ 설정 탭 ══════════ -->
    <div class="tab-pane" data-tab="settings">

      <!-- 멤버 관리 -->
      <div class="setting-section">
        <div class="setting-section-title">멤버 관리</div>
        <div class="card" style="padding:12px 16px">
          <div id="member-settings-list">
            <div class="loading"><div class="spinner"></div></div>
          </div>
          <div class="divider" style="margin:8px 0"></div>
          <div class="input-group">
            <input class="input-field" id="member-name-input"
                   placeholder="새 멤버 이름"
                   style="padding:10px 12px;font-size:var(--font-sm)"
                   onkeydown="if(event.key==='Enter') Actions.addMember()"/>
            <button class="btn btn-primary" style="width:auto;padding:10px 14px;font-size:var(--font-sm)"
                    onclick="Actions.addMember()">추가</button>
          </div>
        </div>
      </div>

      <!-- 식당 즐겨찾기 -->
      <div class="setting-section">
        <div class="setting-section-title">식당 즐겨찾기</div>
        <div class="card" style="padding:12px 16px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
            <span style="font-size:var(--font-sm);color:var(--gray-500)">등록된 식당</span>
            <button class="btn btn-ghost btn-sm" onclick="Actions.openAddRestaurant()">+ 식당 추가</button>
          </div>
          <div id="restaurant-settings-list"></div>
        </div>
      </div>

      <!-- 데이터 관리 -->
      <div class="setting-section">
        <div class="setting-section-title">데이터 관리</div>
        <div class="card" style="padding:0;overflow:hidden">
          <div class="setting-item" onclick="Actions.exportData()">
            <div class="setting-item-icon" style="background:var(--primary-light)">📤</div>
            <div class="setting-item-text">
              <div class="setting-item-label">데이터 백업</div>
              <div class="setting-item-desc">JSON 파일로 내보내기</div>
            </div>
            <div class="setting-item-arrow">›</div>
          </div>
        </div>
      </div>

    </div><!-- /설정 탭 -->

  </div><!-- /tab-content -->


  <!-- ────────── 하단 탭바 ────────── -->
  <nav class="tab-bar">

    <button class="tab-item active" data-tab="home">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>홈</span>
    </button>

    <button class="tab-item" data-tab="records">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span>기록</span>
    </button>

    <button class="tab-item" data-tab="settings">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <span>설정</span>
    </button>

  </nav>

</div><!-- /app -->


<!-- ════════════════════════════════════
     바텀시트 & 오버레이
════════════════════════════════════ -->
<div class="sheet-overlay" id="sheet-overlay"></div>

<!-- 담당자 교체 시트 -->
<div class="bottom-sheet" id="sheet-payer-change">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-title">담당자 교체</div>
  </div>
  <div class="sheet-body">
    <div id="sheet-payer-list"></div>
  </div>
</div>

<!-- 식당 직접 입력 시트 -->
<div class="bottom-sheet" id="sheet-restaurant-input">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-title">식당 입력</div>
  </div>
  <div class="sheet-body">
    <input class="input-field" id="restaurant-input-field"
           placeholder="식당 이름을 입력하세요"
           onkeydown="if(event.key==='Enter') Actions.confirmRestaurantInput()"/>
    <button class="btn btn-primary" onclick="Actions.confirmRestaurantInput()">확인</button>
  </div>
</div>

<!-- 게스트 추가 시트 -->
<div class="bottom-sheet" id="sheet-guest-add">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-title">게스트 추가</div>
  </div>
  <div class="sheet-body">
    <input class="input-field" id="guest-name-input"
           placeholder="게스트 이름"
           onkeydown="if(event.key==='Enter') Actions.addGuestConfirm()"/>
    <button class="btn btn-primary" onclick="Actions.addGuestConfirm()">추가</button>
  </div>
</div>

<!-- 기록 상세 시트 -->
<div class="bottom-sheet" id="sheet-record-detail">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-title">식사 기록</div>
  </div>
  <div class="sheet-body" id="sheet-record-body"></div>
</div>

<!-- 기록 수정 시트 -->
<div class="bottom-sheet" id="sheet-record-edit">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-title">기록 수정</div>
  </div>
  <div class="sheet-body" id="sheet-record-edit-body"></div>
</div>

<!-- 식당 추가 시트 -->
<div class="bottom-sheet" id="sheet-restaurant-add">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-title">식당 추가</div>
  </div>
  <div class="sheet-body">
    <div>
      <label class="input-label">식당 이름</label>
      <input class="input-field" id="rest-name-input" placeholder="예) 진주회관"
             onkeydown="if(event.key==='Enter') $('rest-menus-input').focus()"/>
    </div>
    <div>
      <label class="input-label">메뉴 (쉼표로 구분)</label>
      <input class="input-field" id="rest-menus-input"
             placeholder="된장찌개, 비빔밥, 순두부찌개"
             onkeydown="if(event.key==='Enter') Actions.addRestaurant()"/>
    </div>
    <button class="btn btn-primary" onclick="Actions.addRestaurant()">추가</button>
  </div>
</div>

<!-- 식당 수정 시트 -->
<div class="bottom-sheet" id="sheet-restaurant-edit">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-title">식당 수정</div>
  </div>
  <div class="sheet-body">
    <input type="hidden" id="edit-rest-id"/>
    <div>
      <label class="input-label">식당 이름</label>
      <input class="input-field" id="edit-rest-name" placeholder="식당 이름"/>
    </div>
    <div>
      <label class="input-label">메뉴 (쉼표로 구분)</label>
      <input class="input-field" id="edit-rest-menus" placeholder="된장찌개, 비빔밥, 삼겹살"/>
    </div>
    <button class="btn btn-primary" onclick="Actions.saveRestaurantEdit()">저장</button>
  </div>
</div>

<!-- 토스트 -->
<div class="toast-container"></div>

<!-- JS 로드 -->
<script src="firebase.js"></script>
<script src="app.js"></script>
<script src="ui.js"></script>

</body>
</html>
